spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@example.com
    password: test-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false
  docker:
    compose:
      enabled: false

jwt:
  secret: TestSecretKeyForJWTTokenGenerationAndValidationShouldBeAtLeast256BitsLongForTestingPurposes
  expiration: 86400000

app:
  base-url: http://localhost:8080
