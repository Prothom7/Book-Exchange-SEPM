<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${page.title}">Book Exchange | Profile</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>
  <th:block th:replace="~{fragments/header :: siteHeader(${navItems}, ${page.activePath})}"></th:block>

  <main>
    <section class="page-banner">
      <div class="container">
        <h2 th:text="${page.heading}">Your Reader Profile</h2>
        <p th:text="${page.description}">Keep your account details and activity in one place.</p>
      </div>
    </section>
  </main>

  <th:block th:replace="~{fragments/footer :: siteFooter}"></th:block>
</body>
</html>
