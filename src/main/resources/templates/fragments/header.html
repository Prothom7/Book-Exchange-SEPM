<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
  <header class="site-header" th:fragment="siteHeader(navItems, activePath)">
    <div class="header-logo-wrap">
      <h1 class="logo">Book Exchange</h1>
    </div>
    <nav class="navbar" aria-label="Main navigation">
      <ul>
        <li th:each="item : ${navItems}">
          <a th:href="@{${item.path}}"
             th:text="${item.label}"
             th:classappend="${item.path == activePath} ? 'active' : ''">Menu</a>
        </li>
      </ul>
    </nav>
  </header>
</body>
</html>
